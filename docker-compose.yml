version: '3.8'

services:
  api:
    build: .
    container_name: spectral-grammar-api
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_FILE=/app/data/spectral_users.db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_demo}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-pk_test_demo}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static:/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: spectral-grammar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./data:/app/data:ro
    depends_on:
      - api
    restart: unless-stopped
